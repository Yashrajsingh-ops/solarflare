version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://solar:solar@db:5432/solar_flare
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./ml:/app/ml       # persist trained model files
      - ./data:/app/data   # persist uploaded CSVs

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: solar
      POSTGRES_PASSWORD: solar
      POSTGRES_DB: solar_flare
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solar -d solar_flare"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
